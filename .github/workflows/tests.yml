name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov ruff

      - name: Syntax check
        run: python -m py_compile scalping_bot.py && python -m py_compile dashboard.py && python -m py_compile backtest.py

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=50
